    // --- Custom Hook: 自動儲存設定到瀏覽器 LocalStorage ---
    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.error(error);
          return initialValue;
        }
      });
      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(storedValue));
        } catch (error) {
          console.warn("LocalStorage 儲存失敗 (可能是圖片檔案過大):", error);
        }
      }, [key, storedValue]);
      return [storedValue, setStoredValue];
    }

    // --- 圖片壓縮處理 (避免超過 Firebase 單筆文件 1MB 限制) ---
    const compressImage = (file, isBg, callback) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          // 背景圖最大寬度 1200px，Logo 最大寬度 400px
          const maxWidth = isBg ? 1200 : 400; 
          let scale = 1;
          if (img.width > maxWidth) {
            scale = maxWidth / img.width;
          }
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          // 背景轉存為品質 70% 的 JPEG 降低容量，Logo 保留 PNG 以維持透明背景
          const mimeType = isBg ? 'image/jpeg' : 'image/png';
          const quality = isBg ? 0.7 : undefined;
          const compressedDataUrl = canvas.toDataURL(mimeType, quality);
          callback(compressedDataUrl);
        };
      };
    };

          const finalCny = customExtraBed.cny !== '' ? customExtraBed.cny : getCalculatedCny(extraBedBaseTwd);

      };

      // --- 圖片上傳處理 ---
      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          compressImage(file, false, (compressedDataUrl) => {
            setCustomLogo(compressedDataUrl);
            setLogoError(false);
          });
        }
      };

      const handleBgUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          compressImage(file, true, (compressedDataUrl) => {
            setCustomBg(compressedDataUrl);
          });
        }
      };

      // --- 備註與副標題操作邏輯 ---
      const handleNoteChange = (index, value) => {
        const newNotes = { ...notes };
        newNotes[editingNoteLang][index] = value;
        setNotes(newNotes);
      };

      const addNote = () => {
        const newNotes = { ...notes };
        newNotes[editingNoteLang].push('');
        setNotes(newNotes);
      };

      const deleteNote = (index) => {
        const newNotes = { ...notes };
        newNotes[editingNoteLang].splice(index, 1);
        setNotes(newNotes);
      };

      // 解析房間文字，自動為括號內的文字取消粗體
      const renderRoomTextWithParenthesis = (text) => {
        // 利用正規表達式切割括號區塊
        const parts = text.split(/([\(（].*?[)）])/);
        return parts.map((part, i) => {
          if (/^[\(（].*[)）]$/.test(part)) {
            // 括號內的文字：正常粗細、微透明
            return <span key={i} className="font-normal opacity-80">{part}</span>;
          }
          // 括號外的文字：預設繼承外層的 font-bold
          return <span key={i}>{part}</span>;
        });
      };

      // 解析備註文字，支援 {extra_fee}、**粗體**、!!紅色粗體!!，並判斷是否為附屬子項目縮小行距
      const renderNoteWithVariable = (text, idx) => {
        // 如果是以全形或半形括號開頭，將上方間距縮小
        const isSubNote = /^[（(]/.test(text.trim());
        const marginTop = idx === 0 ? '0' : (isSubNote ? `${noteLineSpacing * 0.1}rem` : `${noteLineSpacing * 0.4}rem`);

        // 使用正規表達式切割字串，保留標記符號以便判斷
        const parts = text.split(/(\{extra_fee\}|\*\*.*?\*\*|!!.*?!!)/g);
        
        return (
          <p key={idx} style={{ marginTop }}>
            {parts.map((part, i) => {
              if (!part) return null;
              
              // 1. 替換加床費用
              if (part === '{extra_fee}') {
                return <span key={i} className="font-bold text-[#b44b3c]">{getExtraBedPrice()}</span>;
              }
              
              // 2. 處理 **一般粗體** (並且支援裡面再包著 !!紅色!!)
              if (part.startsWith('**') && part.endsWith('**')) {
                const inner = part.slice(2, -2);
                const innerParts = inner.split(/(!!.*?!!)/g);
                return (
                  <strong key={i} className="font-bold">
                    {innerParts.map((ip, j) => (
                      ip.startsWith('!!') && ip.endsWith('!!') 
                        ? <span key={j} className="text-[#b44b3c]">{ip.slice(2, -2)}</span>
                        : ip
                    ))}
                  </strong>
                );
              }
              
              // 3. 處理 !!紅色粗體!! (並且支援裡面再包著 **粗體**)
              if (part.startsWith('!!') && part.endsWith('!!')) {
                const inner = part.slice(2, -2);
                const innerParts = inner.split(/(\*\*.*?\*\*)/g);
                return (
                  <span key={i} className="font-bold text-[#b44b3c]">
                    {innerParts.map((ip, j) => (
                      ip.startsWith('**') && ip.endsWith('**') 
                        ? <span key={j}>{ip.slice(2, -2)}</span>
                        : ip
                    ))}
                  </span>
                );
              }
              
              // 4. 一般純文字
              return <Fragment key={i}>{part}</Fragment>;
            })}
          </p>
        );
      };

      const t = STATIC_TRANSLATIONS[previewLang];

      return (
        <div className="min-h-screen pb-10 fade-in">
          {/* 導航列 */}
          <nav className="bg-white shadow-sm border-b px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row justify-between items-center gap-3 sm:gap-0 sticky top-0 z-20">
            <h1 className="text-lg sm:text-xl font-bold text-gray-700 flex items-center gap-2">
              <span className="bg-[#6b584b] text-white px-2 py-1 rounded text-sm">陳佳苑裡</span>
              報價單管理系統
            </h1>
            <div className="flex items-center gap-1 sm:gap-2 w-full sm:w-auto justify-center">
              <button
                onClick={() => setActiveTab('preview')}
                className={`flex items-center gap-2 px-3 sm:px-4 py-2 rounded-md transition-colors ${activeTab === 'preview' ? 'bg-[#6b584b] text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}`}
              >
                <IconFileText /> <span className="hidden sm:inline">報價單預覽</span>
              </button>
              <button
                onClick={() => setActiveTab('settings')}
                className={`flex items-center gap-2 px-3 sm:px-4 py-2 rounded-md transition-colors ${activeTab === 'settings' ? 'bg-[#6b584b] text-white' : 'bg-gray-100 hover:bg-gray-200 text-gray-700'}`}
              >
                <IconSettings /> <span className="hidden sm:inline">價格與備註設定</span>
              </button>
              {/* 登出按鈕 */}
              {isSettingsUnlocked && (
                <Fragment>
                  <div className="w-px h-6 bg-gray-300 mx-2"></div>
                  <button
                    onClick={handleLogout}
                    className="flex items-center gap-1.5 px-3 py-2 text-gray-500 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors font-medium text-sm"
                    title="鎖定設定"
                  >
                    <IconLogOut /> <span className="hidden sm:inline">鎖定</span>
                  </button>
                </Fragment>
              )}
            </div>
          </nav>

          <main className="p-6 max-w-5xl mx-auto">
            
            {/* ================= 未解鎖時的登入畫面 (點擊設定才會看到) ================= */}
            {activeTab === 'settings' && !isSettingsUnlocked && (
              <div className="flex items-center justify-center py-10">
                <div className="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 fade-in w-full max-w-sm">
                  <div className="text-center mb-6">
                    <div className="w-12 h-12 bg-[#6b584b] rounded-xl mx-auto flex items-center justify-center mb-4 shadow-md shadow-[#6b584b]/30">
                      <IconSettings stroke="white" />
                    </div>
                    <h2 className="text-xl font-bold text-gray-800">管理員驗證</h2>
                    <p className="text-gray-500 mt-2 text-sm font-medium">請輸入系統密碼以進入設定頁面</p>
                  </div>
                  
                  <form onSubmit={handleLogin} className="space-y-4">
                    <div>
                      <input 
                        type="password" 
                        value={inputPass} 
                        onChange={e => setInputPass(e.target.value)} 
                        className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-[#6b584b] focus:border-[#6b584b] outline-none transition-shadow bg-gray-50 focus:bg-white text-center tracking-widest text-lg" 
                        placeholder="請輸入密碼" 
                        required 
                      />
                    </div>
                    
                    {loginError && (
                      <div className="bg-red-50 text-red-600 text-sm font-bold p-3 rounded-lg flex items-center justify-center gap-2">
                        <IconInfo />
                        密碼錯誤，請重新確認
                      </div>
                    )}
                    
                    <button type="submit" className="w-full bg-[#6b584b] hover:bg-[#524237] text-white font-bold py-3 rounded-xl transition-colors shadow-md mt-2 flex justify-center items-center gap-2">
                      驗證並進入
                    </button>
                  </form>
                </div>
              </div>
            )}

            {/* ================= 設定頁面 ================= */}
            {activeTab === 'settings' && isSettingsUnlocked && (
              <div className="space-y-6 fade-in">
                
                {/* 雲端儲存控制面板 */}
                <div className="bg-[#6b584b]/10 p-5 rounded-xl border border-[#6b584b]/20 flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div>
                    <h2 className="text-lg font-bold text-[#6b584b]">雲端同步與儲存</h2>
                    <p className="text-sm text-[#6b584b]/80">將目前的價格與設定 (包含上傳的圖片) 儲存到 Firebase 雲端，確保跨裝置同步最新資料。</p>
                  </div>
                  <button 
                    onClick={saveToCloud} 
                    disabled={isSaving || !isLoaded}
                    className="flex items-center gap-2 bg-[#6b584b] hover:bg-[#524237] text-white px-6 py-3 rounded-lg font-bold transition-all shadow-md active:scale-95 disabled:opacity-50"
                  >
                    <IconCloudSave />
                    {isSaving ? "上傳同步中..." : "儲存設定至雲端"}
                  </button>
                </div>

                {/* 1. 匯率設定 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-[#6b584b]">
                  <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">1. 匯率設定 (作為換算標準)</h2>
                  <div className="flex flex-wrap gap-8">
                    <div className="flex items-center gap-3">
                      <label className="text-gray-600 font-medium w-36">1 人民幣 (RMB) = </label>
                      <input type="number" step="0.01" value={rates.cnyToTwd} onChange={(e) => setRates({...rates, cnyToTwd: Number(e.target.value)})}
                        className="border border-gray-300 rounded px-3 py-2 w-24 focus:ring-2 focus:ring-[#6b584b] outline-none" />
                      <span className="text-gray-600 font-medium">台幣 (TWD)</span>
                    </div>
                    <div className="flex items-center gap-3">
                      <label className="text-gray-600 font-medium w-36">1 美金 (USD) = </label>
                      <input type="number" step="0.01" value={rates.usdToTwd} onChange={(e) => setRates({...rates, usdToTwd: Number(e.target.value)})}
                        className="border border-gray-300 rounded px-3 py-2 w-24 focus:ring-2 focus:ring-[#6b584b] outline-none" />
                      <span className="text-gray-600 font-medium">台幣 (TWD)</span>
                    </div>
                  </div>
                </div>

                {/* 2. 加床費用設定 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">2. 加床費用設定 (以台幣為基礎)</h2>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-gray-50 text-gray-600 text-sm">
                          <th className="p-3 border-b whitespace-nowrap">基礎定價 (台幣 TWD)</th>
                          <th className="p-3 border-b whitespace-nowrap">自動換算金額</th>
                          <th className="p-3 border-b bg-orange-50 text-orange-800 whitespace-nowrap">手動覆蓋外幣價格 (留空則使用自動計算)</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td className="p-3 border-b font-medium bg-blue-50/30 align-top" rowSpan="2">
                            <div className="flex items-center gap-2 mt-2">
                              <span>NT$</span>
                              <input type="number" value={extraBedBaseTwd} onChange={(e) => setExtraBedBaseTwd(Number(e.target.value))}
                                className="border border-blue-200 rounded px-2 py-1 w-24 focus:ring-2 focus:ring-blue-400 outline-none bg-white font-bold text-blue-900" />
                            </div>
                          </td>
                          <td className="p-3 border-b text-gray-600">
                            人民幣: ¥ {getCalculatedCny(extraBedBaseTwd)}
                          </td>
                          <td className="p-3 border-b bg-orange-50/30">
                            <div className="flex items-center gap-2">¥ <input type="number" placeholder="選填" value={customExtraBed.cny} onChange={(e) => setCustomExtraBed({...customExtraBed, cny: e.target.value})} className="border border-orange-200 rounded px-2 py-1 w-24 outline-none" /></div>
                          </td>
                        </tr>
                        <tr>
                          <td className="p-3 text-gray-600">
                            美金: $ {getCalculatedUsd(extraBedBaseTwd)}
                          </td>
                          <td className="p-3 bg-orange-50/30">
                            <div className="flex items-center gap-2">$ <input type="number" placeholder="選填" value={customExtraBed.usd} onChange={(e) => setCustomExtraBed({...customExtraBed, usd: e.target.value})} className="border border-orange-200 rounded px-2 py-1 w-24 outline-none" /></div>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* 3. 房間價格微調 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <div className="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 className="text-lg font-bold text-gray-800">3. 房間價格設定 (以台幣為基礎)</h2>
                    <button onClick={resetCustomPrices} className="flex items-center gap-1 text-sm text-[#6b584b] hover:text-[#524237]">
                      <IconRefresh /> 清除所有外幣手動微調
                    </button>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-gray-50 text-gray-600 text-sm">
                          <th className="p-3 border-b whitespace-nowrap">房間</th>
                          <th className="p-3 border-b bg-blue-50/50 whitespace-nowrap">基礎定價 (台幣 TWD)</th>
                          <th className="p-3 border-b bg-orange-50/30 whitespace-nowrap">人民幣 (RMB) 定價</th>
                          <th className="p-3 border-b bg-orange-50/30 whitespace-nowrap">美金 (USD) 定價</th>
                        </tr>
                      </thead>
                      <tbody>
                        {ROOMS_DATA.map((room) => {
                          const baseTwd = basePricesTwd[room.id] || 0;
                          return (
                            <tr key={room.id} className="hover:bg-gray-50 border-b">
                              <td className="p-3 font-medium whitespace-nowrap">{room.name['zh-TW']}</td>
                              
                              <td className="p-3 bg-blue-50/30">
                                <div className="flex items-center gap-1 text-blue-900 font-medium">
                                  NT$ <input
                                    type="number"
                                    value={baseTwd}
                                    onChange={(e) => setBasePricesTwd({...basePricesTwd, [room.id]: Number(e.target.value)})}
                                    className="border border-blue-200 rounded px-2 py-1 w-20 bg-white outline-none focus:ring-1 focus:ring-blue-400"
                                  />
                                </div>
                              </td>

                              <td className="p-3 bg-orange-50/20">
                                <div className="flex items-center gap-2">
                                  <span className="text-gray-400 text-sm w-12 shrink-0">自動: ¥{getCalculatedCny(baseTwd)}</span>
                                  <span className="text-gray-300">|</span>
                                  <span className="text-sm shrink-0">自訂: ¥</span>
                                  <input
                                    type="number"
                                    placeholder="選填"
                                    value={customPricesCny[room.id] !== undefined ? customPricesCny[room.id] : ''}
                                    onChange={(e) => setCustomPricesCny({...customPricesCny, [room.id]: e.target.value === '' ? undefined : Number(e.target.value)})}
                                    className="border border-orange-200 rounded px-2 py-1 w-16 bg-white outline-none focus:ring-1 focus:ring-orange-400 text-sm"
                                  />
                                </div>
                              </td>

                              <td className="p-3 bg-orange-50/20">
                                <div className="flex items-center gap-2">
                                  <span className="text-gray-400 text-sm w-12 shrink-0">自動: ${getCalculatedUsd(baseTwd)}</span>
                                  <span className="text-gray-300">|</span>
                                  <span className="text-sm shrink-0">自訂: $</span>
                                  <input
                                    type="number"
                                    placeholder="選填"
                                    value={customPricesUsd[room.id] !== undefined ? customPricesUsd[room.id] : ''}
                                    onChange={(e) => setCustomPricesUsd({...customPricesUsd, [room.id]: e.target.value === '' ? undefined : Number(e.target.value)})}
                                    className="border border-orange-200 rounded px-2 py-1 w-16 bg-white outline-none focus:ring-1 focus:ring-orange-400 text-sm"
                                  />
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* 4. 副標題與備註欄位編輯 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex justify-between items-center">
                    <span>4. 副標題與備註編輯</span>
                    <select value={editingNoteLang} onChange={(e) => setEditingNoteLang(e.target.value)} className="text-sm font-normal border rounded px-2 py-1 outline-none">
                      <option value="zh-TW">編輯 繁體中文</option>
                      <option value="zh-CN">編輯 簡體中文</option>
                      <option value="en">編輯 English</option>
                    </select>
                  </h2>

                  {/* 副標題編輯 */}
                  <div className="mb-6 bg-orange-50/50 p-4 rounded-lg border border-orange-100">
                    <label className="block text-sm font-bold text-gray-700 mb-2">報價單副標題：</label>
                    <input 
                      type="text" 
                      value={subtitles[editingNoteLang]} 
                      onChange={(e) => setSubtitles({...subtitles, [editingNoteLang]: e.target.value})}
                      className="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-[#6b584b] outline-none"
                    />
                  </div>

                  {/* 備註行距調整 */}
                  <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 mb-5 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <label className="text-sm font-bold text-gray-700 whitespace-nowrap">備註行距調整：</label>
                    <input 
                      type="range" 
                      min="1.2" 
                      max="3.0" 
                      step="0.1" 
                      value={noteLineSpacing} 
                      onChange={(e) => setNoteLineSpacing(Number(e.target.value))}
                      className="w-full sm:w-48 accent-[#6b584b]"
                    />
                    <span className="text-sm font-medium text-[#6b584b] w-8">{noteLineSpacing}</span>
                  </div>
                  
                  <div className="bg-blue-50 text-blue-800 p-4 rounded-lg mb-5 text-sm flex gap-2 items-start border border-blue-100">
                    <div className="mt-0.5 flex-shrink-0"><IconInfo /></div>
                    <div className="space-y-2 w-full">
                      <p className="font-bold">文字排版小技巧：</p>
                      <ul className="list-disc pl-4 space-y-1 opacity-90">
                        <li>輸入 <code className="bg-white px-1 py-0.5 rounded border border-blue-200">**文字**</code> 可將文字變成<strong>一般粗體</strong> (例：**8.5折優惠**)</li>
                        <li>輸入 <code className="bg-white px-1 py-0.5 rounded border border-blue-200">!!文字!!</code> 可將文字變成<span className="font-bold text-[#b44b3c]">紅色粗體</span> (例：!!注意事項!!)</li>
                        <li>輸入 <code className="bg-white px-1 py-0.5 rounded border border-blue-200">{'{extra_fee}'}</code> 會自動替換為計算後的<span className="font-bold text-[#b44b3c]">紅色加床費用</span></li>
                      </ul>
                    </div>
                  </div>

                  <div className="space-y-3">
                    {notes[editingNoteLang].map((note, index) => (
                      <div key={index} className="flex gap-3 items-start group">
                        <div className="pt-2 text-gray-400 font-mono text-sm">{index + 1}.</div>
                        <textarea 
                          value={note}
                          onChange={(e) => handleNoteChange(index, e.target.value)}
                          className="flex-1 border border-gray-300 rounded-lg p-2 min-h-[60px] focus:ring-2 focus:ring-[#6b584b] outline-none resize-y"
                          placeholder="輸入備註內容..."
                        />
                        <button 
                          onClick={() => deleteNote(index)}
                          className="p-2 text-gray-400 hover:text-red-500 transition-colors mt-1 rounded-md hover:bg-red-50"
                          title="刪除此備註"
                        >
                          <IconTrash />
                        </button>
                      </div>
                    ))}
                  </div>
                  
                  <button onClick={addNote} className="mt-4 flex items-center gap-2 text-[#6b584b] font-medium hover:bg-[#6b584b]/10 px-4 py-2 rounded-lg transition-colors">
                    <IconPlus /> 新增一行備註
                  </button>
                </div>

                {/* 5. Logo 上傳 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">5. 底部 Logo 與文字設定</h2>
                  <div className="flex flex-col sm:flex-row items-start gap-6">
                    <div className="flex-1 w-full space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">上傳自訂 Logo 圖片 (建議透明背景 PNG)</label>
                        <input
                          type="file"
                          accept="image/*"
                          onChange={handleLogoUpload}
                          className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-[#6b584b] file:text-white hover:file:bg-[#524237] cursor-pointer border border-gray-200 rounded-md p-1"
                        />
                        {customLogo && customLogo !== 'logo3.png' && (
                          <button onClick={() => { setCustomLogo('logo3.png'); setLogoError(false); }} className="mt-3 text-sm flex items-center gap-1 text-red-500 hover:text-red-700 font-medium">
                            <IconTrash /> 移除自訂 Logo (恢復預設 logo3.png)
                          </button>
                        )}
                      </div>
                      
                      <div className="border-t border-gray-100 pt-4">
                        <label className="text-sm font-bold text-gray-700 mb-2 block">Logo 顯示大小調整：</label>
                        <div className="flex items-center gap-4 mb-4">
                          <input 
                            type="range" 
                            min="20" 
                            max="150" 
                            value={logoSize} 
                            onChange={(e) => setLogoSize(Number(e.target.value))}
                            className="w-full sm:w-64 accent-[#6b584b]"
                          />
                          <span className="text-sm font-medium text-[#6b584b]">{logoSize}px</span>
                        </div>

                        <label className="flex items-center gap-2 text-sm font-bold text-gray-700 mb-3 cursor-pointer">
                          <input 
                            type="checkbox" 
                            checked={showBottomText} 
                            onChange={(e) => setShowBottomText(e.target.checked)}
                            className="w-4 h-4 text-[#6b584b] focus:ring-[#6b584b] rounded"
                          />
                          顯示 Logo 旁邊的文字 (若您上傳的圖片已包含文字，可取消勾選)
                        </label>
                        
                        {showBottomText && (
                          <div className="flex gap-4">
                            <div className="flex-1">
                              <label className="block text-xs text-gray-500 mb-1">主標題</label>
                              <input type="text" value={bottomTextMain} onChange={(e) => setBottomTextMain(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-1.5 focus:ring-2 focus:ring-[#6b584b] outline-none text-sm" />
                            </div>
                            <div className="flex-1">
                              <label className="block text-xs text-gray-500 mb-1">副標題 (英文小字)</label>
                              <input type="text" value={bottomTextSub} onChange={(e) => setBottomTextSub(e.target.value)} className="w-full border border-gray-300 rounded px-3 py-1.5 focus:ring-2 focus:ring-[#6b584b] outline-none text-sm" />
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                    <div className="w-32 h-32 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-[#4a3f38] overflow-hidden shrink-0 mt-4 sm:mt-0 relative">
                      {customLogo && !logoError ? (
                        <img src={customLogo} alt="Custom Logo Preview" style={{ height: `${logoSize}px`, maxWidth: '100%', objectFit: 'contain' }} onError={() => setLogoError(true)} />
                      ) : (
                        <span className="text-xs text-white/50 text-center leading-tight">尚未加入圖片</span>
                      )}
                    </div>
                  </div>
                </div>

                {/* 6. 背景圖片上傳 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">6. 外層背景底圖設定 (白色卡片後方)</h2>
                  <div className="flex flex-col sm:flex-row items-center gap-6">
                    <div className="flex-1 w-full">
                      <label className="block text-sm font-medium text-gray-700 mb-2">上傳自訂報價單底圖 (將顯示於中央卡片的後方)</label>
                      <input
                        type="file"
                        accept="image/*"
                        onChange={handleBgUpload}
                        className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-[#6b584b] file:text-white hover:file:bg-[#524237] cursor-pointer border border-gray-200 rounded-md p-1"
                      />
                      {customBg && (
                        <button onClick={() => setCustomBg(null)} className="mt-3 text-sm flex items-center gap-1 text-red-500 hover:text-red-700 font-medium">
                          <IconTrash /> 清除並恢復預設深色底
                        </button>
                      )}
                    </div>
                    <div className="w-32 h-32 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50 overflow-hidden shrink-0 relative">
                      {customBg ? (
                        <img src={customBg} alt="Background Preview" className="absolute inset-0 w-full h-full object-cover opacity-80" />
                      ) : (
                        <span className="text-xs text-gray-400 text-center leading-tight">未上傳<br/>使用預設深色底</span>
                      )}
                    </div>
                  </div>
                </div>

                {/* 7. 更新日期設定 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">7. 更新日期標示設定</h2>
                  <div className="flex items-center gap-4">
                    <label className="text-sm font-medium text-gray-700">顯示於報價單右下角的日期：</label>
                    <input
                      type="date"
                      value={updateDate.replace(/\//g, '-')}
                      onChange={(e) => setUpdateDate(e.target.value.replace(/-/g, '/'))}
                      className="border border-gray-300 rounded px-3 py-2 w-48 focus:ring-2 focus:ring-[#6b584b] outline-none cursor-pointer"
                    />
                  </div>
                  <p className="text-xs text-gray-400 mt-2">提示：將會自動在中文版顯示「{updateDate} 更新」，在英文版顯示「Updated {updateDate}」。</p>
                </div>
                
                {/* 8. 系統密碼設定 */}
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">8. 系統設定密碼更改</h2>
                  <div className="flex items-center gap-4">
                    <label className="text-sm font-medium text-gray-700">新密碼：</label>
                    <input
                      type="text"
                      value={settingsPassword}
                      onChange={(e) => setSettingsPassword(e.target.value)}
                      className="border border-gray-300 rounded px-3 py-2 w-48 focus:ring-2 focus:ring-[#6b584b] outline-none"
                      placeholder="請輸入新密碼"
                    />
                  </div>
                  <p className="text-xs text-gray-400 mt-2">提示：更改後請點擊上方「儲存設定至雲端」，下次進入設定頁面需輸入此新密碼。</p>
                </div>

              </div>
            )}

            {/* ================= 預覽頁面 ================= */}
            {activeTab === 'preview' && (
              <div className="space-y-6 fade-in">
                {/* 預覽控制器 (手機版排版優化) */}
                <div className="bg-white p-4 sm:p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col lg:flex-row gap-4 lg:gap-6 lg:items-center justify-between">
                  <div className="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
                    
                    {/* 語系選擇 */}
                    <div className="flex items-center justify-between sm:justify-start gap-2 bg-gray-50 sm:bg-transparent p-2 sm:p-0 rounded-lg border sm:border-0 border-gray-200">
                      <label className="text-sm font-bold text-gray-700 whitespace-nowrap">顯示語系：</label>
                      <select 
                        value={previewLang} 
                        onChange={(e) => setPreviewLang(e.target.value)}
                        className="border border-gray-300 rounded px-2 py-1.5 bg-white outline-none focus:ring-2 focus:ring-[#6b584b] text-sm flex-1 sm:flex-none font-medium"
                      >
                        <option value="zh-TW">繁體中文</option>
                        <option value="zh-CN">簡體中文</option>
                        <option value="en">English</option>
                      </select>
                    </div>

                    {/* 幣值選擇 */}
                    <div className="flex items-center justify-between sm:justify-start gap-2 bg-gray-50 sm:bg-transparent p-2 sm:p-0 rounded-lg border sm:border-0 border-gray-200">
                      <label className="text-sm font-bold text-gray-700 whitespace-nowrap">報價幣值：</label>
                      <div className="flex bg-gray-200 sm:bg-gray-100 rounded p-1 flex-1 sm:flex-none">
                        {['TWD', 'CNY', 'USD'].map((curr) => (
                          <button 
                            key={curr}
                            onClick={() => setPreviewCurrency(curr)}
                            className={`flex-1 sm:flex-none px-2 py-1 rounded text-[13px] sm:text-sm transition-colors ${previewCurrency === curr ? 'bg-white shadow font-bold text-[#6b584b]' : 'text-gray-500 hover:text-gray-700 font-medium'}`}
                          >
                            {curr === 'TWD' ? '台幣' : curr === 'CNY' ? '人民幣' : '美金'}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                  
                  {/* 下載圖片按鈕 */}
                  <button 
                    onClick={downloadImage}
                    disabled={isExporting}
                    className="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 sm:py-2.5 rounded-lg font-bold transition-all shadow-md active:scale-95 disabled:opacity-50 w-full lg:w-auto mt-1 lg:mt-0"
                  >
                    <IconDownload />
                    {isExporting ? "匯出中..." : "下載報價單 (PNG)"}
                  </button>
                </div>

                {/* 模擬圖片渲染區 */}
                <div className="flex justify-center">
                  {/* 最外層容器 (包含您上傳的底圖) */}
                  <div id="export-card" className="w-full max-w-[600px] relative shadow-2xl overflow-hidden rounded-[1rem]" 
                       style={customBg ? { backgroundImage: `url(${customBg})`, backgroundSize: 'cover', backgroundPosition: 'center' } : { backgroundColor: '#4a3f38' }}>
                    
                    {/* 預設外圍底圖網點 (未上傳圖片時顯示) */}
                    {!customBg && (
                      <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#ffffff 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                    )}
                    
                    {/* 內部米色區塊 (懸浮卡片) */}
                    <div className="pt-6 sm:pt-8 px-4 sm:px-10 pb-20 sm:pb-28 relative z-10">
                      <div className="bg-[#f2eee8] rounded-[1.5rem] sm:rounded-[2rem] shadow-xl relative overflow-hidden">
                        
                        {/* 米色卡片內的裝飾網點 */}
                        <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#6b584b 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                        
                        <div className="relative p-5 sm:p-10 text-[#5c4a40]">
                          
                          {/* 標題 */}
                          <div className="mb-5 sm:mb-8">
                            <h1 className="text-2xl sm:text-3xl font-extrabold mb-2 sm:mb-3 tracking-wide">{t.title}</h1>
                            {/* 副標題設定為 font-bold 且可以從設定中編輯 */}
                            <p className="text-[10px] sm:text-sm opacity-80 font-bold">{subtitles[previewLang]}</p>
                          </div>

                          {/* 表格 */}
                          <div className="mb-6 sm:mb-8">
                            {/* 調整欄位比例：位置(2), 房間(3), 簡介(4), 價格(3) */}
                            <div className="grid grid-cols-12 border-b border-[#5c4a40]/20 pb-2 sm:pb-3 mb-3 sm:mb-4 text-[11px] sm:text-sm font-bold opacity-80">
                              <div className="col-span-2 text-left pr-1 sm:pr-2">{t.headerLoc}</div>
                              <div className="col-span-3 pr-1 sm:pr-2">{t.headerRoom}</div>
                              <div className="col-span-4 pr-1 sm:pr-2">{t.headerType}</div>
                              <div className="col-span-3 text-right whitespace-nowrap">
                                {t.headerPrice}
                                {previewCurrency === 'CNY' && <span className="text-[9px] sm:text-[11px] font-normal opacity-80 tracking-normal ml-0.5">(人民币)</span>}
                                {previewCurrency === 'USD' && <span className="text-[9px] sm:text-[11px] font-normal opacity-80 tracking-normal ml-0.5">(USD)</span>}
                              </div>
                            </div>

                            <div className="space-y-3 sm:space-y-4">
                              {/* 古厝 */}
                              <div className="grid grid-cols-12 items-center relative">
                                <div className="col-span-2 text-left font-bold opacity-80 pr-1 sm:pr-2 leading-snug text-[12px] sm:text-base">{t.locOld}</div>
                                <div className="col-span-10 space-y-3 sm:space-y-4">
                                  {ROOMS_DATA.filter(r => r.loc === 'old').map(room => (
                                    <div key={room.id} className="grid grid-cols-10 items-center">
                                      {/* 房型名稱：加粗，但用 renderRoomTextWithParenthesis 自動過濾括號內容 */}
                                      <div className="col-span-3 font-bold text-[11px] sm:text-[15px] pr-1 sm:pr-2 relative">
                                        {room.name[previewLang].startsWith('*') ? (
                                          <>
                                            <span className="absolute -left-2.5 sm:-left-3.5 opacity-80 font-normal">*</span>
                                            {renderRoomTextWithParenthesis(room.name[previewLang].replace(/^\*\s*/, ''))}
                                          </>
                                        ) : (
                                          renderRoomTextWithParenthesis(room.name[previewLang])
                                        )}
                                      </div>
                                      {/* 房間簡介：加粗，但用 renderRoomTextWithParenthesis 自動過濾括號內容 */}
                                      <div className="col-span-4 font-bold text-[10px] sm:text-sm opacity-90 pr-1 sm:pr-2 leading-snug">
                                        {renderRoomTextWithParenthesis(room.desc[previewLang])}
                                      </div>
                                      <div className="col-span-3 text-right font-bold text-[13px] sm:text-lg whitespace-nowrap">{getFinalRoomPrice(room)}</div>
                                    </div>
                                  ))}
                                </div>
                              </div>
                              
                              <div className="border-t border-dashed border-[#5c4a40]/30 my-4 sm:my-6"></div>
                              
                              {/* 新居 */}
                              <div className="grid grid-cols-12 items-center">
                                <div className="col-span-2 text-left font-bold opacity-80 pr-1 sm:pr-2 leading-snug text-[12px] sm:text-base">{t.locNew}</div>
                                <div className="col-span-10 space-y-3 sm:space-y-4">
                                  {ROOMS_DATA.filter(r => r.loc === 'new').map(room => (
                                    <div key={room.id} className="grid grid-cols-10 items-center">
                                      <div className="col-span-3 font-bold text-[11px] sm:text-[15px] pr-1 sm:pr-2 relative">
                                        {room.name[previewLang].startsWith('*') ? (
                                          <>
                                            <span className="absolute -left-2.5 sm:-left-3.5 opacity-80 font-normal">*</span>
                                            {renderRoomTextWithParenthesis(room.name[previewLang].replace(/^\*\s*/, ''))}
                                          </>
                                        ) : (
                                          renderRoomTextWithParenthesis(room.name[previewLang])
                                        )}
                                      </div>
                                      <div className="col-span-4 font-bold text-[10px] sm:text-sm opacity-90 pr-1 sm:pr-2 leading-snug">
                                        {renderRoomTextWithParenthesis(room.desc[previewLang])}
                                      </div>
                                      <div className="col-span-3 text-right font-bold text-[13px] sm:text-lg whitespace-nowrap">{getFinalRoomPrice(room)}</div>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            </div>
                            <div className="border-b border-[#5c4a40]/20 mt-4 sm:mt-6 mb-4 sm:mb-6"></div>
                          </div>

                          {/* 備註區 (動態渲染) */}
                          <div className="text-[10px] sm:text-[13px] opacity-80 font-medium flex flex-col" style={{ lineHeight: noteLineSpacing }}>
                            {notes[previewLang].map((note, idx) => renderNoteWithVariable(note, idx))}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* 底部 Logo (直接疊加在外圍底圖上，如同原版海報) */}
                    <div className="absolute bottom-4 sm:bottom-8 left-0 right-0 flex items-center justify-center gap-2 sm:gap-3 text-white z-20 drop-shadow-md">
                      {customLogo && !logoError ? (
                        <img src={customLogo} alt="Logo" className="w-auto object-contain" style={{ height: `${logoSize}px` }} onError={() => setLogoError(true)} />
                      ) : (
                        <div className="w-8 h-8 sm:w-10 sm:h-10 border-2 border-white rounded-md flex items-center justify-center relative bg-[#524237]">
                          <div className="absolute top-1 w-3 sm:w-4 h-1 bg-white"></div>
                          <div className="absolute bottom-2 w-5 sm:w-6 h-2 sm:h-3 border border-white"></div>
                        </div>
                      )}
                      
                      {showBottomText && (
                        <div className="font-bold text-lg sm:text-2xl tracking-widest flex items-baseline gap-1.5">
                          {bottomTextMain} <span className="text-[8px] sm:text-[10px] uppercase font-normal tracking-normal opacity-80">{bottomTextSub}</span>
                        </div>
                      )}
                    </div>

                    {/* 右下角時間戳記 */}
                    <div className="absolute bottom-2 sm:bottom-3 right-3 sm:right-5 z-20 text-[9px] sm:text-[11px] text-white/70 tracking-wider">
                      {previewLang === 'en' ? `Updated ${updateDate}` : `${updateDate} ${t.updated}`}
                    </div>

                  </div>
                </div>
                
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
